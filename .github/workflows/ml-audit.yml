name: ML Audit

on: [push]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Audit on Sample Buggy Notebook
        run: |
          python -c "
          from ml_auditor.engine import AuditorEngine
          eng = AuditorEngine('tests/sample_notebooks/buggy_notebook.ipynb')
          
          # Get the results dictionary
          results = eng.run_audit()
          
          # Extract the issues list correctly
          issues = results['issues']
          
          print(f'Audit Complete. Health Score: {results[\"score\"]}')
          print(f'Found {len(issues)} issue(s).')
          
          for i in issues:
              print(f'- {i[\"type\"]} on line {i[\"line\"]}: {i[\"message\"]}')
          "
